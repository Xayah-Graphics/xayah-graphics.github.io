name: Deploy static site to GitHub Pages

on:
  push:
    branches: ["master"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Tectonic
        uses: wtfjoke/setup-tectonic@v4
        with:
          tectonic-version: 0.16.9
      - name: Build project and publication documents
        shell: bash
        run: |
          set -euo pipefail
          for root in projects publications; do
            [[ -d "$root" ]] || continue
            while IFS= read -r -d '' source; do
              tectonic -X compile -p "$source"
            done < <(find "$root" -mindepth 2 -maxdepth 2 -type f -name '*.tex' -print0)
          done
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Upload site
        uses: actions/upload-pages-artifact@v4
        with:
          path: .
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
