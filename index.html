    <section class="section-container projects-section" aria-labelledby="projects-title">
      <h2 id="projects-title" class="section-title">Projects</h2>
      <div id="project-list" class="project-list"></div>
    </section>
  </main>

  <footer class="site-footer">
    <p id="footer-text"></p>
  </footer>

  <template id="news-template">
    <li class="news-item">
      <time class="news-date"></time>
      <p class="news-message"></p>
    </li>
  </template>

  <template id="publication-template">
    <article class="publication-card">
      <div class="publication-layout">
        <div class="thumbnail-frame">
          <span class="thumbnail-fallback" aria-hidden="true"></span>
          <img class="publication-image" alt="" width="896" height="504" loading="lazy" decoding="async">
        </div>
        <div class="publication-content">
          <h3 class="publication-title"></h3>
          <p class="publication-authors"></p>
          <p class="publication-venue"></p>
          <div class="resource-list"></div>
        </div>
      </div>
    </article>
  </template>

  <template id="project-template">
    <article class="project-card">
      <div class="project-layout">
        <div class="project-image-frame">
          <img class="project-image" alt="" width="2172" height="724" loading="lazy" decoding="async">
        </div>
        <div class="project-content">
          <h3 class="project-title"></h3>
          <p class="project-description"></p>
          <ul class="project-tags" aria-label="Technologies"></ul>
          <div class="resource-list project-links"></div>
        </div>
      </div>
    </article>
  </template>

  <script>
    (() => {
      "use strict";

      const config = SITE_CONFIG;
      const byId = (id) => document.getElementById(id);
      const validUrl = (value) => typeof value === "string" && value.trim() !== "";

      function applyLink(anchor, url, newTab = false) {
        anchor.href = url;
        if (newTab || /^https?:/i.test(url)) {
          anchor.target = "_blank";
          anchor.rel = "noopener noreferrer";
        }
      }

      function renderStructuredData() {
        const { profile, socials } = config;
        const pageUrl = document.querySelector('link[rel="canonical"]').href;

        const jsonLd = document.createElement("script");
        jsonLd.type = "application/ld+json";
        jsonLd.textContent = JSON.stringify({
          "@context": "https://schema.org",
          "@type": "Person",
          name: profile.name,
          alternateName: profile.localizedName || undefined,
          jobTitle: profile.subtitle,
          url: pageUrl,
          email: profile.email ? `mailto:${profile.email}` : undefined,
          image: profile.avatarUrl,
          sameAs: socials
            .filter((item) => validUrl(item.url) && /^https?:/i.test(item.url))
            .map((item) => item.url)
        });
        document.head.append(jsonLd);
      }

      function renderProfile() {
        const { profile, labels } = config;
        const avatarImage = byId("avatar-image");

        byId("skip-link").textContent = labels.skip;
        byId("profile-name").textContent = profile.name;
        byId("localized-name").textContent = profile.localizedName ? ` (${profile.localizedName})` : "";
        byId("profile-subtitle").textContent = profile.subtitle;
        byId("news-title").textContent = labels.news;
        byId("publications-title").textContent = labels.publications;
        byId("projects-title").textContent = labels.projects;
        byId("footer-text").textContent = `© ${new Date().getFullYear()} ${profile.name}. ${labels.footer}`;

        if (validUrl(profile.avatarUrl)) {
          avatarImage.alt = profile.avatarAlt || `Portrait of ${profile.name}`;
          avatarImage.addEventListener("error", () => {
            avatarImage.hidden = true;
          }, { once: true });
          avatarImage.src = profile.avatarUrl;
        } else {
          avatarImage.hidden = true;
        }
      }

      function renderBio() {
        const target = byId("profile-bio");
        const bio = config.profile.bio || {};
        target.replaceChildren();

        function appendContent(element, fragments) {
          for (const fragment of fragments || []) {
            const content = document.createTextNode(fragment.text || "");

            if (validUrl(fragment.url)) {
              const anchor = document.createElement("a");
              applyLink(anchor, fragment.url);
              anchor.append(content);
              element.append(anchor);
            } else {
              element.append(content);
            }
          }
        }

        for (const paragraph of bio.paragraphs || []) {
          const p = document.createElement("p");
          p.textContent = paragraph;
          target.append(p);
        }

        if ((bio.interests || []).length) {
          const heading = document.createElement("h2");
          const list = document.createElement("ul");
          heading.className = "bio-heading";
          heading.textContent = bio.interestsTitle || "Research Interests";
          list.className = "bio-interests";

          for (const interest of bio.interests) {
            const item = document.createElement("li");
            item.textContent = interest;
            list.append(item);
          }

          target.append(heading, list);
        }

        if ((bio.contact || []).length) {
          const contact = document.createElement("p");
          contact.className = "bio-contact";
          appendContent(contact, bio.contact);
          target.append(contact);
        }
      }

      function createIcon(type, className, fallback) {
        const supported = new Set(["github", "mail", "scholar", "paper", "preprint", "document", "link"]);
        const icon = supported.has(type) ? type : fallback;
        const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
        const use = document.createElementNS("http://www.w3.org/2000/svg", "use");
        svg.setAttribute("class", `${className} ${icon === "github" ? `${className}--fill` : ""}`.trim());
        svg.setAttribute("aria-hidden", "true");
        use.setAttribute("href", `#icon-${icon}`);
        svg.append(use);
        return svg;
      }

      function socialIcon(type) {
        return type === "text" ? null : createIcon(type, "social-icon", "scholar");
      }

      function renderSocials() {
        const target = byId("social-list");
        target.replaceChildren();

        for (const social of config.socials || []) {
          if (!validUrl(social.url)) continue;
          const item = document.createElement("li");
          const anchor = document.createElement("a");
          const graphic = socialIcon(social.icon);
          anchor.className = "social-link";
          anchor.setAttribute("aria-label", social.label);
          anchor.title = social.label;
          applyLink(anchor, social.url);
          if (graphic) anchor.append(graphic);
          else anchor.textContent = social.label;
          item.append(anchor);
          target.append(item);
        }
      }

      function renderAuthors(target, authors) {
        target.replaceChildren();
        (authors || []).forEach((author, index) => {
          if (index > 0) target.append(document.createTextNode(", "));
          const span = document.createElement("span");
          span.textContent = author.name;
          if (author.featured) span.className = "featured-author";
          target.append(span);
        });
      }

      function renderResources(target, links) {
        const usable = (links || []).filter((item) => validUrl(item.url));
        target.replaceChildren();

        if (!usable.length) {
          const note = document.createElement("span");
          note.className = "resource-note";
          note.textContent = config.labels.resourcesForthcoming;
          target.append(note);
          return;
        }

        for (const resource of usable) {
          const anchor = document.createElement("a");
          anchor.className = "resource-link";
          applyLink(anchor, resource.url, resource.newTab);
          anchor.append(
            createIcon(resource.icon, "resource-icon", "link"),
            document.createTextNode(resource.label)
          );
          target.append(anchor);
        }
      }

      function formatNewsDate(value) {
        const match = /^(\d{4})-(\d{2})(?:-(\d{2}))?$/.exec(value || "");
        if (!match) return "";

        const [, year, month, day] = match;
        const numericYear = Number(year);
        const numericMonth = Number(month);
        const numericDay = Number(day || 1);
        if (numericMonth < 1 || numericMonth > 12) return "";

        const date = new Date(Date.UTC(numericYear, numericMonth - 1, numericDay));
        if (
          Number.isNaN(date.getTime()) ||
          date.getUTCFullYear() !== numericYear ||
          date.getUTCMonth() !== numericMonth - 1 ||
          date.getUTCDate() !== numericDay
        ) return "";

        return new Intl.DateTimeFormat("en", {
          month: "short",
          year: "numeric",
          ...(day ? { day: "numeric" } : {}),
          timeZone: "UTC"
        }).format(date);
      }

      function renderNews() {
        const section = byId("news-section");
        const target = byId("news-list");
        const template = byId("news-template");
        const news = [...(config.news || [])]
          .filter((item) => formatNewsDate(item.date) && (item.content || []).some((part) => part.text))
          .sort((left, right) => right.date.localeCompare(left.date));

        target.replaceChildren();
        section.hidden = news.length === 0;

        for (const item of news) {
          const fragment = template.content.cloneNode(true);
          const date = fragment.querySelector(".news-date");
          const message = fragment.querySelector(".news-message");

          date.dateTime = item.date;
          date.textContent = formatNewsDate(item.date);

          for (const part of item.content) {
            const content = document.createTextNode(part.text || "");
            if (validUrl(part.url)) {
              const anchor = document.createElement("a");
              applyLink(anchor, part.url, part.newTab);
              anchor.append(content);
              message.append(anchor);
            } else {
              message.append(content);
            }
          }

          target.append(fragment);
        }
      }

      function renderPublications() {
        const target = byId("publication-list");
        const template = byId("publication-template");
        target.replaceChildren();

        for (const publication of config.publications || []) {
          const fragment = template.content.cloneNode(true);
          const image = fragment.querySelector(".publication-image");

          fragment.querySelector(".publication-title").textContent = publication.title;
          fragment.querySelector(".publication-venue").textContent = publication.venue || "";
          fragment.querySelector(".thumbnail-fallback").textContent = config.labels.imageFallback;
          renderAuthors(fragment.querySelector(".publication-authors"), publication.authors || []);
          renderResources(fragment.querySelector(".resource-list"), publication.links || []);

          if (validUrl(publication.imageUrl)) {
            image.alt = publication.imageAlt || `Preview for ${publication.title}`;
            image.addEventListener("error", () => {
              image.hidden = true;
            }, { once: true });
            image.src = publication.imageUrl;
          } else {
            image.hidden = true;
          }

          target.append(fragment);
        }
      }

      function renderProjects() {
        const target = byId("project-list");
        const template = byId("project-template");
        target.replaceChildren();

        for (const project of config.projects || []) {
          const fragment = template.content.cloneNode(true);
          const image = fragment.querySelector(".project-image");
          const tags = fragment.querySelector(".project-tags");

          fragment.querySelector(".project-title").textContent = project.title;
          fragment.querySelector(".project-description").textContent = project.description || "";
          renderResources(fragment.querySelector(".project-links"), project.links || []);

          for (const tag of project.tags || []) {
            const item = document.createElement("li");
            item.className = "project-tag";
            item.textContent = tag;
            tags.append(item);
          }

          if (validUrl(project.imageUrl)) {
            image.alt = project.imageAlt || `Preview for ${project.title}`;
            image.addEventListener("error", () => {
              image.hidden = true;
            }, { once: true });
            image.src = project.imageUrl;
          } else {
            image.hidden = true;
          }

          target.append(fragment);
        }
      }

      renderStructuredData();
      renderProfile();
      renderBio();
      renderSocials();
      renderNews();
      renderPublications();
      renderProjects();
    })();
  </script>
